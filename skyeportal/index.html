<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skye Portal — Key Command Center</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --bg:#02020a;
  --panel:rgba(8,8,20,0.65);
  --panel-strong:rgba(15,17,38,0.95);
  --border:rgba(255,255,255,0.1);
  --text:#ebf1ff;
  --muted:#9aa4c6;
  --purple:#7c3aed;
  --purple-light:#c5b3fe;
  --gold:#fbbf24;
  --teal:#3ddad4;
  --danger:#f87171;
  --font-sans:'Inter',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --glow:0 20px 45px rgba(0,0,0,0.45);
}
*{box-sizing:border-box;}
body{
  margin:0;
  min-height:100vh;
  font-family:var(--font-sans);
  background:
    radial-gradient(circle at 15% 20%, rgba(255,255,255,0.08), transparent 40%),
    radial-gradient(circle at 85% 0%, rgba(124,58,237,0.35), transparent 35%),
    #02020a;
  color:var(--text);
}
.portal-shell{
  width:min(1320px,100%);
  margin:0 auto;
  padding:32px 24px 72px;
}
.hero{
  display:flex;
  align-items:stretch;
  justify-content:space-between;
  gap:28px;
  padding:32px;
  border-radius:28px;
  border:1px solid rgba(255,255,255,0.08);
  background:linear-gradient(135deg, rgba(124,58,237,0.25), rgba(7,7,21,0.8));
  box-shadow:var(--glow);
  position:relative;
  overflow:hidden;
}
.hero::after{
  content:'';
  position:absolute;
  inset:10px;
  border-radius:24px;
  border:1px solid rgba(255,255,255,0.03);
  pointer-events:none;
}
.hero__content{
  max-width:640px;
}
.hero-eyebrow{
  font-size:11px;
  letter-spacing:0.5em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:12px;
}
.hero__content h1{
  font-size:clamp(32px,4vw,44px);
  margin:0 0 14px;
  font-weight:700;
  letter-spacing:-0.02em;
}
.hero-subtitle{
  color:var(--muted);
  line-height:1.6;
  margin-bottom:20px;
}
.hero-stats{
  display:flex;
  gap:24px;
  flex-wrap:wrap;
  margin-bottom:16px;
}
.hero-stats div{
  display:flex;
  flex-direction:column;
  gap:4px;
}
.hero-stats strong{
  font-size:28px;
  font-weight:700;
}
.hero-label{
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:0.3em;
  color:var(--muted);
}
.hero-dots{
  display:flex;
  gap:10px;
}
.hero-dots .dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:rgba(255,255,255,0.25);
  animation:glow 2.4s infinite ease-in-out;
}
.hero-dots .dot:nth-child(2){animation-delay:0.3s;}
.hero-dots .dot:nth-child(3){animation-delay:0.6s;}
.hero-dots .dot.active{background:var(--purple-light);}
@keyframes glow{
  0%,100%{transform:translateY(0);opacity:0.5;}
  50%{transform:translateY(-6px);opacity:1;}
}
.hero__actions{
  display:flex;
  flex-direction:column;
  gap:22px;
  width:min(320px,45%);
}
.key-status{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(0,0,0,0.25);
}
.key-status strong{
  display:block;
  font-size:16px;
}
.key-status .muted{
  color:var(--muted);
  font-size:12px;
}
.ks-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  border:1px solid rgba(255,255,255,0.4);
  background:rgba(255,255,255,0.2);
}
.ks-dot.ok{
  background:#10b981;
  box-shadow:0 0 10px rgba(16,185,129,.6);
}
.hero-buttons{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.hbtn{
  border:none;
  border-radius:14px;
  padding:10px 18px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  background:rgba(255,255,255,0.08);
  color:#fff;
  transition:all .25s;
}
.hbtn.primary{
  background:var(--purple);
  box-shadow:0 12px 24px rgba(124,58,237,0.35);
}
.hbtn.gold{
  background:var(--gold);
  color:#05050a;
}
.hbtn:hover{
  transform:translateY(-2px);
}
.meta-grid{
  margin-top:28px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}
.board-card,.analytics-card,.template-card{
  border-radius:20px;
  padding:24px;
  background:var(--panel);
  border:1px solid var(--border);
  box-shadow:0 20px 40px rgba(0,0,0,0.35);
}
.card-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}
.card-head h3{
  margin:4px 0 0;
  font-size:20px;
  letter-spacing:-0.02em;
}
.card-head .eyebrow{
  font-size:12px;
  letter-spacing:0.4em;
  color:var(--muted);
  text-transform:uppercase;
}
.badge-live{
  background:rgba(16,185,129,0.1);
  color:#10b981;
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.2em;
}
.brief-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(120px,1fr));
  gap:14px;
}
.brief-grid div{
  padding:10px 12px;
  border-radius:12px;
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.05);
}
.brief-grid span{
  color:var(--muted);
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.3em;
}
.brief-grid strong{
  font-size:22px;
  display:block;
  margin-top:6px;
}
.metric-row{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:14px;
  margin-bottom:18px;
}
.metric-row div{
  padding:12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.06);
  background:rgba(255,255,255,0.02);
}
.metric-row span{
  font-size:11px;
  color:var(--muted);
  display:block;
  margin-bottom:4px;
}
.metric-row strong{
  font-size:20px;
}
.sparkline{
  height:40px;
  border-radius:10px;
  background:linear-gradient(90deg, rgba(59,173,224,0.3), rgba(124,58,237,0.3));
  position:relative;
  overflow:hidden;
}
.sparkline::after{
  content:'';
  position:absolute;
  bottom:0;
  left:0;
  height:12px;
  width:40%;
  background:linear-gradient(90deg, rgba(251,191,36,0.8), rgba(251,191,36,0));
  border-radius:12px;
}
.template-list{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.template-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.05);
  background:rgba(255,255,255,0.02);
}
.template-label{
  font-weight:600;
  margin:0;
}
.template-desc{
  margin:4px 0 0;
  font-size:12px;
  color:var(--muted);
}
.template-row button{
  padding:6px 12px;
}
.workspace{
  margin-top:32px;
}
.tabbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  position:relative;
  z-index:2;
  margin-bottom:14px;
}
.tab{
  padding:10px 16px;
  border-radius:12px;
  cursor:pointer;
  border:1px solid transparent;
  transition:all .25s;
  font-size:12px;
  font-weight:600;
  letter-spacing:0.2em;
  text-transform:uppercase;
  background:rgba(255,255,255,0.02);
}
.tab.active{
  background:var(--panel-strong);
  border-color:rgba(124,58,237,0.5);
  color:#fff;
  box-shadow:0 10px 20px rgba(0,0,0,0.4);
}
.tab:hover{
  border-color:rgba(255,255,255,0.2);
}
#main{
  min-height:500px;
}
.pane{
  display:none;
}
.pane.active{
  display:flex;
  flex-direction:column;
  gap:18px;
}
.card{
  border-radius:18px;
  background:rgba(12,13,30,0.85);
  border:1px solid rgba(255,255,255,0.07);
  padding:20px;
  box-shadow:0 15px 35px rgba(0,0,0,0.45);
}
.card-title{
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:0.3em;
  color:var(--muted);
  margin-bottom:16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.card-title .badge{
  margin-left:auto;
}
.row{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}
.col{
  flex:1;
  min-width:280px;
}
input.inp,select.inp,textarea.inp{
  width:100%;
  background:#0c0c1f;
  border:1px solid rgba(255,255,255,0.05);
  color:var(--text);
  border-radius:10px;
  padding:11px 14px;
  font-size:14px;
  font-family:var(--font-sans);
}
input.inp:focus,select.inp:focus,textarea.inp:focus{
  border-color:rgba(124,58,237,0.8);
  outline:none;
}
.lbl{
  font-size:11px;
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:var(--muted);
  display:block;
  margin-top:16px;
  margin-bottom:6px;
}
.btn{
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:var(--text);
  padding:10px 16px;
  font-weight:600;
  cursor:pointer;
  transition:all .25s;
}
.btn:hover{
  opacity:0.9;
}
.btn.primary{
  background:var(--purple);
  border-color:var(--purple);
  color:#fff;
}
.btn.cyan{
  background:var(--teal);
  border-color:var(--teal);
  color:#02020a;
}
.btn.gold{
  background:var(--gold);
  border-color:var(--gold);
  color:#02020a;
}
.btn.danger{
  border-color:var(--danger);
  color:var(--danger);
}
.btn.sm{
  padding:6px 10px;
  font-size:12px;
}
.key-list{
  display:flex;
  flex-direction:column;
  gap:12px;
}
.key-card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:14px;
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:12px;
}
.kc-label{
  font-weight:600;
  display:flex;
  align-items:center;
  gap:6px;
}
.kc-purpose{
  font-size:10px;
  background:rgba(59,173,224,0.12);
  padding:2px 6px;
  border-radius:6px;
}
.app-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:12px;
}
.app-card{
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.05);
  padding:14px;
  background:rgba(255,255,255,0.02);
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
}
.app-card.ok{
  border-color:rgba(16,185,129,0.5);
}
.app-card.err{
  border-color:rgba(248,113,113,0.5);
}
.console-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
}
.con-out{
  background:#050513;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
  padding:14px;
  font-family:var(--font-mono);
  min-height:220px;
}
#qr-box{
  border-radius:14px;
}
.prop-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.prop-item{
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
  padding:10px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.prop-dot{
  width:8px;
  height:8px;
  border-radius:50%;
}
#toast{
  position:fixed;
  bottom:22px;
  right:24px;
  display:flex;
  flex-direction:column;
  gap:8px;
  pointer-events:none;
}
.t{
  background:rgba(0,0,0,0.8);
  color:#fff;
}
</head>
<body>
  <div class="portal-shell">
    <section class="hero">
      <div class="hero__content">
        <p class="hero-eyebrow">BroadcastChannel · kaixu_events</p>
        <h1>Skye Portal Command Board</h1>
        <p class="hero-subtitle">Mission control for keys, telemetry, and vault automation. Keep every app in sync, view health status, and export encrypted backups without leaving the board.</p>
        <div class="hero-stats">
          <div>
            <span class="hero-label">Key ring</span>
            <strong id="board-key-count" data-board-key-count>0</strong>
          </div>
          <div>
            <span class="hero-label">Apps online</span>
            <strong data-board-apps>0/0</strong>
          </div>
          <div>
            <span class="hero-label">Heartbeat</span>
            <strong data-board-heartbeat>waiting</strong>
          </div>
        </div>
        <div class="hero-dots">
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
      <div class="hero__actions">
        <div class="key-status">
          <div class="ks-dot" id="ks-dot"></div>
          <div>
            <strong id="ks-label">No key set</strong>
            <span class="muted">KAIXU_VIRTUAL_KEY</span>
          </div>
        </div>
        <div class="hero-buttons">
          <button class="hbtn primary" onclick="runHealthCheck()">Refresh Health</button>
          <button class="hbtn" onclick="propagateAll()">Propagate All</button>
          <button class="hbtn gold" onclick="openAddKey()">+ Add Key</button>
        </div>
      </div>
    </section>
    <section class="meta-grid">
      <article class="board-card">
        <div class="card-head">
          <div>
            <p class="eyebrow">Board Brief</p>
            <h3>Executive snapshot</h3>
          </div>
          <span class="badge-live">Live</span>
        </div>
        <div class="brief-grid">
          <div>
            <span>Keyring</span>
            <strong id="board-key-count-secondary" data-board-key-count>0</strong>
          </div>
          <div>
            <span>Apps online</span>
            <strong id="board-apps-online" data-board-apps>0/0</strong>
          </div>
          <div>
            <span>Gateway</span>
            <strong id="board-gateway-status">pipeline idle</strong>
          </div>
          <div>
            <span>Propagation</span>
            <strong id="board-prop-status">waiting</strong>
          </div>
        </div>
        <div class="brief-grid" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));">
          <div>
            <span>Heartbeat</span>
            <strong id="board-last-heartbeat" data-board-heartbeat>waiting</strong>
          </div>
          <button class="btn sm" onclick="runHealthCheck()">Re-run health check</button>
        </div>
      </article>
      <article class="analytics-card">
        <div class="card-head">
          <div>
            <p class="eyebrow">Telemetry</p>
            <h3>Operational analytics</h3>
          </div>
          <span class="badge-live">Pulse</span>
        </div>
        <div class="metric-row">
          <div>
            <span>Propagation coverage</span>
            <strong id="propagation-metric">0%</strong>
          </div>
          <div>
            <span>App reach</span>
            <strong id="app-health-metric">0%</strong>
          </div>
          <div>
            <span>Keys captured</span>
            <strong id="storage-metric">0 keys</strong>
          </div>
        </div>
        <div class="sparkline" aria-hidden="true"></div>
      </article>
      <article class="template-card">
        <div class="card-head">
          <div>
            <p class="eyebrow">Templates</p>
            <h3>Keycraft presets</h3>
          </div>
          <button class="btn sm" onclick="renderTemplates()">Refresh</button>
        </div>
        <div id="template-list" class="template-list">
          <p style="color:var(--muted);font-size:12px;">Templates load automatically.</p>
        </div>
      </article>
    </section>
    <div class="workspace">
      <div class="tabbar">
        <div class="tab active" onclick="goTab('keys',this)">🗝 Keyring</div>
        <div class="tab" onclick="goTab('propagate',this)">⟳ Propagate</div>
        <div class="tab" onclick="goTab('apps',this)">◆ App Health</div>
        <div class="tab" onclick="goTab('qr',this)">◻ QR Export</div>
        <div class="tab" onclick="goTab('console',this)">⚡ Console</div>
        <div class="tab" onclick="goTab('vault',this)">🔒 Vault</div>
      </div>
      <div id="main">

  <!-- ══════════ KEYRING ══════════ -->
  <div id="pane-keys" class="pane active">

    <!-- Add / Edit form -->
    <div class="card" id="form-card">
      <div class="card-title">Add / Edit Key <span class="badge p" id="form-mode-badge">NEW</span></div>
      <div class="row">
        <div class="col">
          <label class="lbl">Label (friendly name)</label>
          <input class="inp" id="f-label" placeholder="Main kAIxU Key">

          <label class="lbl">Purpose / localStorage key</label>
          <select class="inp" id="f-purpose" onchange="purposeChanged()">
            <option value="KAIXU_VIRTUAL_KEY">KAIXU_VIRTUAL_KEY — main ecosystem key</option>
            <option value="SKYE_KEY_DEFAULT">SKYE_KEY_DEFAULT — Skye Portal default</option>
            <option value="SKYE_KEY_AUDIO">SKYE_KEY_AUDIO — audio/voice</option>
            <option value="SKYE_KEY_VISION">SKYE_KEY_VISION — vision/images</option>
            <option value="SKYE_KEY_ADMIN">SKYE_KEY_ADMIN — admin operations</option>
            <option value="custom">Custom key name…</option>
          </select>
          <div id="custom-purpose-wrap" style="display:none;margin-top:6px">
            <input class="inp mono" id="f-custom-purpose" placeholder="MY_CUSTOM_KEY_NAME">
          </div>
        </div>
        <div class="col">
          <label class="lbl">Key Value</label>
          <div class="inp-group">
            <input class="inp mono" id="f-value" type="password" placeholder="Paste key here…">
            <button class="btn sm" onclick="toggleFValue()">Show</button>
          </div>
          <label class="lbl">Notes (optional)</label>
          <input class="inp" id="f-notes" placeholder="e.g. Production key, expires 2027">
        </div>
      </div>
      <div class="row" style="margin-top:14px;gap:8px">
        <button class="btn primary" onclick="saveKey()">Save Key</button>
        <button class="btn" onclick="resetForm()">Cancel</button>
        <div id="f-edit-id" style="display:none"></div>
      </div>
    </div>

    <!-- Key list -->
    <div class="card" style="flex:1">
      <div class="card-title">
        Stored Keys
        <span class="badge g" id="key-count-badge">0 keys</span>
      </div>
      <div class="key-list" id="key-list">
        <div style="color:var(--muted);font-size:13px">No keys stored yet. Add your KAIXU_VIRTUAL_KEY above.</div>
      </div>
    </div>
  </div>

  <!-- ══════════ PROPAGATE ══════════ -->
  <div id="pane-propagate" class="pane">
    <div class="card">
      <div class="card-title">Key Propagation</div>
      <p style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:16px">
        All apps under this domain share the same <code style="color:var(--accent2)">localStorage</code>.
        Propagating writes your key(s) to the correct namespace so every app can pick them up
        immediately — no re-entering keys app by app.
      </p>
      <div class="row" style="gap:10px;margin-bottom:16px">
        <button class="btn primary" onclick="propagateAll()">⟳ Propagate All Keys</button>
        <button class="btn cyan" onclick="checkPropStatus()">▶ Check Status</button>
        <button class="btn danger" onclick="clearAllKeys()">✕ Clear All from localStorage</button>
      </div>
      <div class="prop-list" id="prop-list">
        <div style="color:var(--muted);font-size:13px">Click "Check Status" to see propagation state.</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">What gets propagated</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.9;font-family:var(--mono)">
        <div>• <span style="color:var(--accent2)">KAIXU_VIRTUAL_KEY</span> → Used by ALL kAIxU ecosystem apps</div>
        <div>• <span style="color:var(--accent2)">SKYE_KEY_*</span> → Used by Skye Portal Netlify functions</div>
        <div>• Any custom key you add is written to localStorage under its exact key name</div>
        <br>
        <div style="color:var(--warn)">⚠ Keys are stored unencrypted in localStorage. Use Vault tab for AES-encrypted backup.</div>
      </div>
    </div>
  </div>

  <!-- ══════════ APP HEALTH ══════════ -->
  <div id="pane-apps" class="pane">
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">

<div id="toast"></div>

<script>
// ── Config ─────────────────────────────────────────────────────────
const IS_LOCAL = location.hostname==='localhost'||location.hostname==='127.0.0.1';
const GW_URL = (IS_LOCAL?'/api':'https://skyesol.netlify.app')+'/.netlify/functions/gateway-chat';
const bc = new BroadcastChannel('kaixu_events');
const HEARTBEAT_RE = /\[HEARTBEAT\]\s*(.*)/i;
function handleBroadcastEvent(event){
  const message = event?.data?.message;
  if(typeof message !== 'string') return;
  if(!message.includes('[HEARTBEAT]')) return;
  const heartbeatText = message.replace(HEARTBEAT_RE,'$1').trim() || 'heartbeat received';
  lastHeartbeatLabel = heartbeatText;
  const serverMatch = heartbeatText.match(/server=([^ |]+)/i);
  const gatewayMatch = heartbeatText.match(/gateway=([^ |]+)/i);
  const statusParts = [];
  if(serverMatch) statusParts.push(`server=${serverMatch[1]}`);
  if(gatewayMatch) statusParts.push(`gateway=${gatewayMatch[1]}`);
  if(statusParts.length) lastGatewayStatus = statusParts.join(' · ');
  refreshDashboard();
}
bc.addEventListener('message', handleBroadcastEvent);
const STORE_KEY = 'SKYEPORTAL_KEYRING_V1';

// The key names that get propagated to localStorage + which apps read which
const KNOWN_PURPOSES = [
  'KAIXU_VIRTUAL_KEY','SKYE_KEY_DEFAULT','SKYE_KEY_AUDIO','SKYE_KEY_VISION','SKYE_KEY_ADMIN'
];

const APPS = [
  {name:'skAIxuide IDE',      path:'/skAIxuide/',                    key:'KAIXU_VIRTUAL_KEY'},
  {name:'Neural Space Pro',   path:'/Neural-Space-Pro/',              key:'KAIXU_VIRTUAL_KEY'},
  {name:'WebPile Pro',        path:'/WebPilePro/',                    key:'KAIXU_VIRTUAL_KEY'},
  {name:'SkyeDocx',           path:'/SkyeDocx/',                     key:'KAIXU_VIRTUAL_KEY'},
  {name:'SkyeVault',          path:'/SkyeVault/',                    key:'KAIXU_VIRTUAL_KEY'},
  {name:'GodKode',            path:'/GodKode/',                      key:'KAIXU_VIRTUAL_KEY'},
  {name:'GodCode',            path:'/GodCode/',                      key:'KAIXU_VIRTUAL_KEY'},
  {name:'KaiPrompt',          path:'/KaiPrompt/',                    key:'KAIXU_VIRTUAL_KEY'},
  {name:'KaiXu Magic',        path:'/kaixumagic/',                   key:'KAIXU_VIRTUAL_KEY'},
  {name:'Nexus Pro',          path:'/Nexus-Pro/NexusPro.html',       key:'KAIXU_VIRTUAL_KEY'},
  {name:'Nexus Forge Studio', path:'/Nexus Forge Studio/',           key:'KAIXU_VIRTUAL_KEY'},
  {name:'PWA Factory',        path:'/PWA Factory/',                  key:'KAIXU_VIRTUAL_KEY'},
  {name:'ReactForge',         path:'/reactforge/',                   key:'KAIXU_VIRTUAL_KEY'},
  {name:'DebugPro',           path:'/DebugPro/',                     key:'KAIXU_VIRTUAL_KEY'},
  {name:'Code Genie',         path:'/Code Genie/',                   key:'KAIXU_VIRTUAL_KEY'},
  {name:'Data Forge',         path:'/Data Forge/',                   key:'KAIXU_VIRTUAL_KEY'},
  {name:'NexusDB Explorer',   path:'/NexusDBExplorer/',              key:'KAIXU_VIRTUAL_KEY'},
  {name:'Webby',              path:'/Webby/',                        key:'KAIXU_VIRTUAL_KEY'},
  {name:'RegexGen',           path:'/RegexGen/',                     key:'KAIXU_VIRTUAL_KEY'},
  {name:'PlanItPro',          path:'/PlanItPro/',                    key:'KAIXU_VIRTUAL_KEY'},
  {name:'SkyeUI Pro',         path:'/skyeuipro/',                    key:'KAIXU_VIRTUAL_KEY'},
  {name:'SkyeBox',            path:'/SkyeBox/',                      key:'KAIXU_VIRTUAL_KEY'},
  {name:'SkyeKnife',          path:'/SkyeKnife/',                    key:'KAIXU_VIRTUAL_KEY'},
  {name:'SkyeDocx',           path:'/SkyeDocx/',                     key:'KAIXU_VIRTUAL_KEY'},
  {name:'SkyeOfferForge',     path:'/skyeofferforge/',               key:'KAIXU_VIRTUAL_KEY'},
  {name:'Sovereign Variables',path:'/SovereignVariables/',           key:'KAIXU_VIRTUAL_KEY'},
  {name:'Nebula TaskForce',   path:'/NEWNEW/',                       key:'KAIXU_VIRTUAL_KEY'},
  {name:'Project Aegis',      path:'/projectaegis-skyex/',           key:'KAIXU_VIRTUAL_KEY'},
  {name:'GotSOLE',            path:'/GotSOLE/',                      key:'KAIXU_VIRTUAL_KEY'},
  {name:'kAIxU Gateway',      path:'https://skyesol.netlify.app/', key:null},
];

const KEY_TEMPLATES = [
  {
    label: 'Executive Key',
    purpose: 'KAIXU_VIRTUAL_KEY',
    value: 'EXEC-FT-2026-KEY',
    description: 'Board-level gateway key for investor dashboards and strategic demos.',
    notes: 'Rotate quarterly and keep the vault copy in the executive binder.'
  },
  {
    label: 'Ops Vault',
    purpose: 'SKYE_KEY_ADMIN',
    value: 'OPS-VAULT-901',
    description: 'Operations automation key for vault exports, deployments, and broker tooling.',
    notes: 'Propagate to your ops apps daily and audit the usage log.'
  },
  {
    label: 'Audit Mirror',
    purpose: 'SKYE_KEY_VISION',
    value: 'AUDIT-2026-NEO',
    description: 'Observability feed key that mirrors console + QR exports for compliance.',
    notes: 'Pair with the console tab for live diagnostics.'
  }
];
let lastHealthStatus={ok:0,total:APPS.length};
let lastGatewayStatus='pipeline idle';
let lastHeartbeatLabel='awaiting heartbeat';

// ── Keyring storage ────────────────────────────────────────────────
function loadRing(){ try{return JSON.parse(localStorage.getItem(STORE_KEY)||'[]')}catch{return[]} }
function saveRing(r){ try{localStorage.setItem(STORE_KEY,JSON.stringify(r))}catch{} }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6) }

// ── Toast ──────────────────────────────────────────────────────────
function toast(msg,type='i'){
  const el=document.createElement('div');
  el.className=`t ${type[0]}`;el.textContent=msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(()=>el.remove(),3200);
}
function updateBoardBrief(){
  const keysCount=loadRing().length;
  document.querySelectorAll('[data-board-key-count]').forEach(el=>el.textContent=keysCount);
  document.querySelectorAll('[data-board-apps]').forEach(el=>el.textContent=`${lastHealthStatus.ok}/${APPS.length}`);
  document.querySelectorAll('[data-board-heartbeat]').forEach(el=>el.textContent=lastHeartbeatLabel);
  const gateway=document.getElementById('board-gateway-status');
  if(gateway) gateway.textContent=lastGatewayStatus;
  const prop=document.getElementById('board-prop-status');
  if(prop) prop.textContent=keysCount?'ready':'waiting';
}
function updateUsageAnalytics(){
  const ring=loadRing();
  const propagated=ring.filter(k=>localStorage.getItem(k.purpose)===k.value).length;
  const coverage=ring.length?Math.round((propagated/ring.length)*100):0;
  const propagationEl=document.getElementById('propagation-metric');
  if(propagationEl) propagationEl.textContent=`${coverage}% coverage`;
  const appHealthEl=document.getElementById('app-health-metric');
  if(appHealthEl) appHealthEl.textContent=`${APPS.length?Math.round((lastHealthStatus.ok/APPS.length)*100):0}% reach`;
  const storageEl=document.getElementById('storage-metric');
  if(storageEl) storageEl.textContent=`${ring.length} key${ring.length===1?'':'s'} ringed`;
}
function refreshDashboard(){
  updateBoardBrief();
  updateUsageAnalytics();
}
function renderTemplates(){
  const list=document.getElementById('template-list');
  if(!list) return;
  list.innerHTML=KEY_TEMPLATES.map((template,idx)=>`
    <div class="template-row">
      <div>
        <p class="template-label">${template.label}</p>
        <p class="template-desc">${template.description}</p>
      </div>
      <button class="btn sm" data-template="${idx}">Use</button>
    </div>
  `).join('');
  list.querySelectorAll('[data-template]').forEach(btn=>{
    btn.addEventListener('click',()=>applyTemplate(KEY_TEMPLATES[btn.dataset.template]));
  });
}
function applyTemplate(template){
  if(!template) return;
  document.getElementById('f-label').value=template.label;
  document.getElementById('f-value').value=template.value;
  document.getElementById('f-notes').value=template.notes;
  document.getElementById('f-purpose').value=template.purpose;
  document.getElementById('custom-purpose-wrap').style.display=template.purpose==='custom'?'':'none';
  if(template.purpose==='custom'&&template.customPurpose){
    document.getElementById('f-custom-purpose').value=template.customPurpose;
  }
  purposeChanged();
  toast(`${template.label} template ready`,'s');
}
function bcLog(msg,type='info'){ bc.postMessage({app:'SkyePortal',type,msg,ts:Date.now()}); }

// ── Tab switcher ──────────────────────────────────────────────────
function goTab(id,el){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='propagate') checkPropStatus();
  if(id==='qr') populateQRSelect();
  if(id==='console') populateConKeySelect();
}

// ── Header key status ─────────────────────────────────────────────
function refreshHeaderStatus(){
  const k=localStorage.getItem('KAIXU_VIRTUAL_KEY')||'';
  const dot=document.getElementById('ks-dot');
  const lbl=document.getElementById('ks-label');
  if(k){ dot.className='ks-dot ok'; lbl.textContent='Key active'; }
  else { dot.className='ks-dot'; lbl.textContent='No key set'; }
}

// ── Form helpers ──────────────────────────────────────────────────
let editingId = null;

function purposeChanged(){
  const v=document.getElementById('f-purpose').value;
  document.getElementById('custom-purpose-wrap').style.display=v==='custom'?'':'none';
}

function getPurpose(){
  const v=document.getElementById('f-purpose').value;
  if(v==='custom') return document.getElementById('f-custom-purpose').value.trim().replace(/\s+/g,'_').toUpperCase();
  return v;
}

function toggleFValue(){
  const el=document.getElementById('f-value');
  el.type=el.type==='password'?'text':'password';
}

function resetForm(){
  editingId=null;
  document.getElementById('f-label').value='';
  document.getElementById('f-purpose').value='KAIXU_VIRTUAL_KEY';
  document.getElementById('f-value').value='';
  document.getElementById('f-notes').value='';
  document.getElementById('f-value').type='password';
  document.getElementById('custom-purpose-wrap').style.display='none';
  document.getElementById('form-mode-badge').textContent='NEW';
}

function openAddKey(){ resetForm(); document.getElementById('f-label').focus(); }

function saveKey(){
  const label=document.getElementById('f-label').value.trim();
  const purpose=getPurpose();
  const value=document.getElementById('f-value').value.trim();
  const notes=document.getElementById('f-notes').value.trim();
  if(!label){ toast('Enter a label','e'); return; }
  if(!purpose){ toast('Enter a purpose key name','e'); return; }
  if(!value){ toast('Enter the key value','e'); return; }
  const ring=loadRing();
  if(editingId){
    const idx=ring.findIndex(k=>k.id===editingId);
    if(idx>=0) ring[idx]={...ring[idx],label,purpose,value,notes,updated:Date.now()};
  } else {
    ring.unshift({id:uid(),label,purpose,value,notes,created:Date.now(),updated:Date.now()});
  }
  saveRing(ring);
  // Immediately propagate to localStorage
  localStorage.setItem(purpose,value);
  refreshHeaderStatus();
  renderKeyList();
  resetForm();
  toast(`Key "${label}" saved & propagated ✅`,'s');
  bcLog('Key saved: '+purpose);
}

function editKey(id){
  const ring=loadRing();
  const k=ring.find(x=>x.id===id);
  if(!k) return;
  editingId=id;
  document.getElementById('f-label').value=k.label||'';
  document.getElementById('f-notes').value=k.notes||'';
  document.getElementById('f-value').value=k.value||'';
  document.getElementById('f-value').type='password';
  document.getElementById('form-mode-badge').textContent='EDIT';
  if(KNOWN_PURPOSES.includes(k.purpose)){
    document.getElementById('f-purpose').value=k.purpose;
    document.getElementById('custom-purpose-wrap').style.display='none';
  } else {
    document.getElementById('f-purpose').value='custom';
    document.getElementById('f-custom-purpose').value=k.purpose;
    document.getElementById('custom-purpose-wrap').style.display='';
  }
  document.getElementById('form-card').scrollIntoView({behavior:'smooth'});
}

function deleteKey(id){
  const ring=loadRing();
  const k=ring.find(x=>x.id===id);
  if(!k||!confirm(`Delete key "${k.label}"?`)) return;
  const newRing=ring.filter(x=>x.id!==id);
  saveRing(newRing);
  renderKeyList();
  toast('Key deleted','e');
}

function copyKeyValue(id){
  const ring=loadRing();
  const k=ring.find(x=>x.id===id);
  if(!k) return;
  navigator.clipboard.writeText(k.value).then(()=>toast('Copied ✓','s')).catch(()=>toast('Copy failed','e'));
}

function maskKey(v){ if(!v||v.length<8) return '••••••••'; return v.slice(0,4)+'•'.repeat(Math.min(v.length-8,12))+v.slice(-4); }

function renderKeyList(){
  const ring=loadRing();
  const el=document.getElementById('key-list');
  document.getElementById('key-count-badge').textContent=ring.length+' key'+(ring.length!==1?'s':'');
  if(!ring.length){
    el.innerHTML='<div style="color:var(--muted);font-size:13px">No keys stored yet. Add your KAIXU_VIRTUAL_KEY above.</div>';
    refreshDashboard();
    return;
  }
  el.innerHTML=ring.map(k=>{
    const isActive=k.purpose==='KAIXU_VIRTUAL_KEY';
    const stored=localStorage.getItem(k.purpose)||'';
    const propagated=stored===k.value;
    return `<div class="key-card${isActive?' active-key':''}">
      <div class="kc-info">
        <div class="kc-label">
          ${escH(k.label)}
          <span class="kc-purpose">${escH(k.purpose)}</span>
          ${propagated?'<span class="badge g">LIVE</span>':'<span class="badge w">NOT SET</span>'}
        </div>
        <div class="kc-value">${maskKey(k.value)}</div>
        <div class="kc-meta">${k.notes?escH(k.notes)+' · ':''} Saved ${new Date(k.created).toLocaleString()}</div>
      </div>
      <div class="kc-actions">
        <button class="btn sm cyan" onclick="propagateOne('${k.id}')">Propagate</button>
        <button class="btn sm" onclick="copyKeyValue('${k.id}')">Copy</button>
        <button class="btn sm" onclick="editKey('${k.id}')">Edit</button>
        <button class="btn sm danger" onclick="deleteKey('${k.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
  refreshDashboard();
}

function propagateOne(id){
  const ring=loadRing();
  const k=ring.find(x=>x.id===id);
  if(!k) return;
  localStorage.setItem(k.purpose,k.value);
  refreshHeaderStatus();
  renderKeyList();
  toast(`"${k.label}" propagated → ${k.purpose}`,'s');
  bcLog('Propagated: '+k.purpose);
}

// ── Propagate ─────────────────────────────────────────────────────
function propagateAll(){
  const ring=loadRing();
  if(!ring.length){ toast('No keys to propagate','e'); return; }
  ring.forEach(k=>{ localStorage.setItem(k.purpose,k.value); });
  refreshHeaderStatus();
  renderKeyList();
  checkPropStatus();
  toast(`${ring.length} key(s) propagated ✅`,'s');
  bcLog('All keys propagated');
}

function checkPropStatus(){
  const ring=loadRing();
  const el=document.getElementById('prop-list');
  if(!ring.length){
    el.innerHTML='<div style="color:var(--muted);font-size:13px">No keys in keyring yet — add them in the Keyring tab.</div>';
    return;
  }
  el.innerHTML=ring.map(k=>{
    const stored=localStorage.getItem(k.purpose)||'';
    const live=stored===k.value;
    const present=!!stored;
    const color=live?'var(--accent3)':present?'var(--warn)':'var(--danger)';
    const msg=live?'LIVE — value matches keyring':present?'SET — but value differs from keyring':'NOT SET in localStorage';
    return `<div class="prop-item">
      <div class="prop-dot" style="background:${color}"></div>
      <div style="flex:1">
        <span style="font-weight:600">${escH(k.label)}</span>
        <span style="color:var(--accent2);font-family:var(--mono);font-size:10px;margin-left:8px">${escH(k.purpose)}</span>
      </div>
      <span style="font-size:11px;color:${color}">${msg}</span>
      <button class="btn sm" onclick="propagateOne('${k.id}')" style="flex-shrink:0">Set</button>
    </div>`;
  }).join('');
}

function clearAllKeys(){
  if(!confirm('Remove ALL keys from localStorage? Your keyring here is untouched.')) return;
  const ring=loadRing();
  ring.forEach(k=>localStorage.removeItem(k.purpose));
  refreshHeaderStatus();
  renderKeyList();
  toast('All keys cleared from localStorage','e');
}

// ── App Health ─────────────────────────────────────────────────────
function buildAppGrid(){
  const grid=document.getElementById('app-grid');
  grid.innerHTML=APPS.map((a,i)=>`
    <div class="app-card" id="ac-${i}">
      <div class="app-name">${a.name}</div>
      <div class="app-path">${a.path}</div>
      <div class="app-status pending" id="as-${i}">● pending</div>
    </div>`).join('');
}

async function checkApp(i){
  const app=APPS[i];
  const card=document.getElementById('ac-'+i);
  const stat=document.getElementById('as-'+i);
  const url=app.path.startsWith('http')?app.path:location.origin+app.path;
  // check if key is present for this app
  const hasKey=app.key?!!localStorage.getItem(app.key):null;
  if(hasKey) card.classList.add('haskey');
  try{
    const t0=performance.now();
    await fetch(url,{method:'HEAD',mode:'no-cors',signal:AbortSignal.timeout(6000)});
    const ms=Math.round(performance.now()-t0);
    card.classList.add('ok');
    stat.className='app-status ok';
    stat.textContent=`● ${ms}ms${hasKey?' 🔑':''}`;
  } catch(e){
    card.classList.add('err');
    stat.className='app-status err';
    stat.textContent='● offline';
  }
}

async function runHealthCheck(){
  const msg=document.getElementById('health-msg');
  msg.textContent='Checking…';
  buildAppGrid();
  const batch=6;
  let done=0;
  for(let i=0;i<APPS.length;i+=batch){
    await Promise.allSettled(APPS.slice(i,i+batch).map((_,j)=>checkApp(i+j)));
    done+=batch;
    msg.textContent=`Checking… ${Math.min(done,APPS.length)} / ${APPS.length}`;
  }
  const ok=document.querySelectorAll('.app-card.ok').length;
  msg.textContent=`Done — ${ok} / ${APPS.length} reachable`;
  toast(`Health check: ${ok} online`,'s');
  lastHealthStatus.ok = ok;
  lastHealthStatus.total = APPS.length;
  refreshDashboard();
}

// ── QR Export ─────────────────────────────────────────────────────
function populateQRSelect(){
  const ring=loadRing();
  const sel=document.getElementById('qr-key-select');
  sel.innerHTML='<option value="">— select a key —</option>';
  ring.forEach(k=>{
    const opt=document.createElement('option');
    opt.value=k.id; opt.textContent=`${k.label} (${k.purpose})`;
    sel.appendChild(opt);
  });
}

function qrKeyChanged(){
  const id=document.getElementById('qr-key-select').value;
  if(!id){ document.getElementById('qr-val').value=''; return; }
  const ring=loadRing();
  const k=ring.find(x=>x.id===id);
  if(k) document.getElementById('qr-val').value=k.purpose+'='+k.value;
}

function toggleQrVal(){
  const el=document.getElementById('qr-val');
  el.type=el.type==='password'?'text':'password';
}

let qrInstance=null;
function generateQR(){
  const val=document.getElementById('qr-val').value.trim();
  if(!val){ toast('Select a key or enter a value','e'); return; }
  const box=document.getElementById('qr-box');
  box.innerHTML='';
  if(qrInstance){ try{qrInstance.clear();}catch(e){} }
  try{
    qrInstance=new QRCode(box,{text:val,width:220,height:220,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    document.getElementById('qr-caption').textContent=val.slice(0,50)+(val.length>50?'…':'');
    document.getElementById('qr-dl-btn').style.display='';
    toast('QR generated ✓','s');
  } catch(e){
    toast('QR error: '+e.message,'e');
  }
}

function clearQR(){
  document.getElementById('qr-box').innerHTML='<span style="color:var(--muted);font-size:12px">QR will appear here</span>';
  document.getElementById('qr-caption').textContent='';
  document.getElementById('qr-dl-btn').style.display='none';
  document.getElementById('qr-key-select').value='';
  document.getElementById('qr-val').value='';
  qrInstance=null;
}

function downloadQR(){
  const img=document.querySelector('#qr-box img');
  if(!img){ toast('Generate QR first','e'); return; }
  const a=document.createElement('a'); a.href=img.src; a.download='skyeportal-key-qr.png'; a.click();
  toast('QR downloaded','s');
}

function importFromQR(){
  const raw=document.getElementById('qr-import-val').value.trim();
  if(!raw){ toast('Paste decoded QR string first','e'); return; }
  const eqIdx=raw.indexOf('=');
  if(eqIdx<1){ toast('Format must be KEY_NAME=value','e'); return; }
  const purpose=raw.slice(0,eqIdx).trim();
  const value=raw.slice(eqIdx+1).trim();
  if(!value){ toast('Empty value in QR string','e'); return; }
  // Save to keyring
  const ring=loadRing();
  const existing=ring.findIndex(k=>k.purpose===purpose);
  if(existing>=0){
    ring[existing].value=value; ring[existing].updated=Date.now();
  } else {
    ring.unshift({id:uid(),label:'Imported: '+purpose,purpose,value,notes:'Imported via QR',created:Date.now(),updated:Date.now()});
  }
  saveRing(ring);
  localStorage.setItem(purpose,value);
  refreshHeaderStatus();
  renderKeyList();
  document.getElementById('qr-import-val').value='';
  toast(`Imported & propagated: ${purpose}`,'s');
  bcLog('QR import: '+purpose);
}

// ── Console ───────────────────────────────────────────────────────
function populateConKeySelect(){
  const ring=loadRing();
  const sel=document.getElementById('con-key-sel');
  sel.innerHTML='<option value="__active__">Active key (KAIXU_VIRTUAL_KEY)</option>';
  ring.forEach(k=>{
    const opt=document.createElement('option');
    opt.value=k.id; opt.textContent=`${k.label} (${k.purpose})`;
    sel.appendChild(opt);
  });
}

function getConsoleKey(){
  const sel=document.getElementById('con-key-sel').value;
  if(sel==='__active__') return localStorage.getItem('KAIXU_VIRTUAL_KEY')||'';
  const ring=loadRing();
  return ring.find(k=>k.id===sel)?.value||'';
}

async function runConsole(){
  const key=getConsoleKey();
  if(!key){ toast('No key available. Add a key first.','e'); return; }
  const prompt=document.getElementById('con-prompt').value.trim()||'Respond with only the word PONG';
  const provider=document.getElementById('con-provider').value;
  const model=document.getElementById('con-model').value;
  const btn=document.getElementById('con-btn');
  const out=document.getElementById('con-out');
  btn.disabled=true; btn.textContent='Sending…';
  out.textContent='// Contacting gateway…'; out.style.color='';
  document.getElementById('con-timing').textContent='';
  const t0=performance.now();
  try{
    const r=await fetch(GW_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({provider,model,messages:[{role:'user',content:prompt}],max_tokens:512})
    });
    if(!r.ok) throw new Error('HTTP '+r.status+': '+(await r.text().catch(()=>'')).slice(0,200));
    const j=await r.json();
    const ms=Math.round(performance.now()-t0);
    const reply=j.choices?.[0]?.message?.content||j.candidates?.[0]?.content?.parts?.[0]?.text||j.content?.[0]?.text||JSON.stringify(j,null,2);
    out.textContent=reply;
    const usage=j.usage||j.usageMetadata||{};
    const inp=usage.prompt_tokens||usage.promptTokenCount||'—';
    const outp=usage.completion_tokens||usage.candidatesTokenCount||'—';
    document.getElementById('con-timing').textContent=`⏱ ${ms}ms`;
    document.getElementById('con-meta').textContent=`${provider} · ${model} · ${inp}→${outp} tokens`;
    toast(`Response received (${ms}ms)`,'s');
    bcLog(`Console: ${provider}/${model} → ${ms}ms`);
  } catch(e){
    out.textContent='ERROR: '+e.message+'\n\nCheck your key and network.';
    out.style.color='var(--danger)';
    toast('Gateway error','e');
  }
  btn.disabled=false; btn.textContent='▶ Test';
}

// ── Vault (AES-GCM) ───────────────────────────────────────────────
function toggleVPass(){ const el=document.getElementById('v-pass'); el.type=el.type==='password'?'text':'password'; }

async function vaultExport(){
  const pass=document.getElementById('v-pass').value;
  if(!pass){ toast('Enter a passphrase','e'); return; }
  const ring=loadRing();
  if(!ring.length){ toast('No keys to export','e'); return; }
  try{
    const enc=await aesEncrypt(JSON.stringify(ring),pass);
    const blob=btoa(JSON.stringify(enc));
    document.getElementById('v-blob-out').value=blob;
    document.getElementById('v-blob-msg').textContent=`Encrypted ${ring.length} key(s) with AES-256-GCM · ${new Date().toLocaleString()}`;
    document.getElementById('v-dl-btn').style.display='';
    toast('Vault exported ✅','s');
  } catch(e){
    toast('Encryption error: '+e.message,'e');
  }
}

function vaultDownload(){
  const blob=document.getElementById('v-blob-out').value;
  if(!blob){ toast('Export first','e'); return; }
  const a=document.createElement('a');
  a.href='data:application/octet-stream;base64,'+btoa(unescape(encodeURIComponent(blob)));
  a.download=`skyeportal-${Date.now()}.vault`;
  a.click();
  toast('Downloaded ✓','s');
}

async function vaultImport(){
  const blobTxt=document.getElementById('v-import-blob').value.trim();
  const pass=document.getElementById('v-import-pass').value;
  if(!blobTxt||!pass){ toast('Paste blob and enter passphrase','e'); return; }
  try{
    const enc=JSON.parse(atob(blobTxt));
    const decrypted=await aesDecrypt(enc,pass);
    const ring=JSON.parse(decrypted);
    if(!Array.isArray(ring)) throw new Error('Not a valid keyring');
    const ok=confirm(`Import ${ring.length} key(s)? This will merge with your existing keyring.`);
    if(!ok) return;
    const current=loadRing();
    ring.forEach(k=>{
      if(!current.find(x=>x.id===k.id)) current.push(k);
    });
    saveRing(current);
    // Propagate all
    current.forEach(k=>localStorage.setItem(k.purpose,k.value));
    refreshHeaderStatus();
    renderKeyList();
    document.getElementById('v-import-blob').value='';
    document.getElementById('v-import-pass').value='';
    toast(`${ring.length} key(s) imported & propagated ✅`,'s');
  } catch(e){
    toast('Decryption failed: wrong passphrase or corrupt blob','e');
  }
}

// AES-GCM helpers
async function deriveKey(pass,salt){
  const passBytes=new TextEncoder().encode(pass);
  const keyMat=await crypto.subtle.importKey('raw',passBytes,'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2',salt,iterations:200000,hash:'SHA-256'},
    keyMat,{name:'AES-GCM',length:256},false,['encrypt','decrypt']
  );
}
async function aesEncrypt(plaintext,pass){
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const key=await deriveKey(pass,salt);
  const data=new TextEncoder().encode(plaintext);
  const cipher=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,data);
  return{
    salt:Array.from(salt),iv:Array.from(iv),
    cipher:Array.from(new Uint8Array(cipher))
  };
}
async function aesDecrypt({salt,iv,cipher},pass){
  const s=new Uint8Array(salt),i2=new Uint8Array(iv),c=new Uint8Array(cipher);
  const key=await deriveKey(pass,s);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:i2},key,c);
  return new TextDecoder().decode(plain);
}
