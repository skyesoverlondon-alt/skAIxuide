<head>

    <title>GODNODE2 // PORTAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Orbitron:wght@400;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
            font-family: 'Orbitron', sans-serif;
        }

        /* --- 3D CANVAS (Stars, Globe & Crown) --- */
        #nexus-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; transition: filter 0.8s ease;
        }

        /* --- OVERLAY UI --- */
        #ui-container {
            position: absolute; inset: 0; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 40px; pointer-events: none;
            background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.85) 100%);
        }

        .header {
            text-align: center; color: #fff;
            text-transform: uppercase; letter-spacing: 15px;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: fadeIn 2.5s ease-out;
        }
        .header h1 { font-family: 'Cinzel', serif; font-size: 4rem; margin: 0; }

        /* --- PORTAL TRIGGERS --- */
        .portals {
            position: absolute; inset: 0;
            display: flex; justify-content: space-around; align-items: center;
            padding: 0 5%; pointer-events: auto;
        }

        .portal-trigger {
            width: 40%; height: 60%;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            cursor: pointer; text-decoration: none; position: relative;
            padding-bottom: 30px;
            z-index: 20;
        }

        .portal-label {
            color: #fff; text-transform: uppercase; letter-spacing: 10px;
            font-size: 1.4rem; text-align: center; font-weight: 900;
            opacity: 0.4; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            transform: translateY(40px);
        }
        .portal-trigger:hover .portal-label { 
            opacity: 1; 
            transform: translateY(0);
            text-shadow: 0 0 30px currentColor; 
        }

        /* --- APP PROJECTION --- */
        #app-projection {
            position: fixed; inset: 0; z-index: 100;
            background: #000; display: none;
            opacity: 0; transform: scale(1.1);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #app-projection.active {
            display: block; opacity: 1; transform: scale(1);
        }

        #app-frame {
            width: 100%; height: 100%; border: none;
        }

        #close-portal {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            z-index: 101; background: rgba(0,0,0,0.9); border: 2px solid rgba(255,255,255,0.3);
            color: #fff; padding: 18px 60px; border-radius: 60px;
            font-family: 'Orbitron', sans-serif; letter-spacing: 5px; font-weight: 900;
            cursor: pointer; backdrop-filter: blur(20px);
            transition: all 0.4s;
        }
        #close-portal:hover { background: #fff; color: #000; box-shadow: 0 0 60px #fff; border-color: #fff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }

        .scanline {
            width: 100%; height: 3px; background: rgba(255, 255, 255, 0.03);
            position: absolute; top: 0; z-index: 5;
            animation: scan 12s linear infinite; pointer-events: none;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    
        /* =========================================================
           GODNODE2 PORTAL — Royal Neon Purple/Blue + Gold
           ========================================================= */
        :root{
            --void:#050012;
            --panel: rgba(12, 6, 28, 0.72);
            --gold:#ffd700;
            --gold-dim: rgba(255,215,0,0.45);
            --blue:#56c7ff;
            --purple:#a855f7;
            --text: rgba(245, 240, 255, 0.94);
            --muted: rgba(220, 210, 255, 0.55);
        }
        body, html{
            background:
                radial-gradient(circle at 15% 20%, rgba(168, 85, 247, 0.20), transparent 55%),
                radial-gradient(circle at 85% 25%, rgba(86, 199, 255, 0.16), transparent 58%),
                radial-gradient(circle at 60% 85%, rgba(255, 215, 0, 0.10), transparent 60%),
                linear-gradient(180deg, #050012 0%, #02000a 60%, #000006 100%);
        }
        #ui-container{
            padding: 40px;
            background:
                radial-gradient(circle at center, transparent 10%, rgba(0,0,0,0.86) 100%),
                repeating-linear-gradient(0deg, rgba(255,215,0,0.035) 0 1px, transparent 1px 46px),
                repeating-linear-gradient(90deg, rgba(86,199,255,0.03) 0 1px, transparent 1px 46px);
            backdrop-filter: blur(2px);
        }
        .header{
            letter-spacing: 0.35em;
            text-shadow: 0 0 22px rgba(86,199,255,0.35), 0 0 48px rgba(255,215,0,0.18);
        }
        .header h1{
            font-size: clamp(2.2rem, 5vw, 4.2rem);
        }
        .portal-label{
            letter-spacing: 0.35em;
            text-shadow: 0 0 26px currentColor;
        }
        .portal-trigger{
            border-radius: 28px;
            position: relative;
        }
        .portal-trigger::before{
            content:"";
            position:absolute;
            inset:-10px;
            border-radius: 34px;
            background:
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 60%),
                conic-gradient(from 180deg, rgba(168,85,247,0.12), rgba(86,199,255,0.12), rgba(255,215,0,0.12), rgba(168,85,247,0.12));
            filter: blur(18px);
            opacity: 0.35;
            transition: opacity 0.4s ease, transform 0.4s ease;
            transform: scale(0.98);
            pointer-events: none;
        }
        .portal-trigger:hover::before{
            opacity: 0.65;
            transform: scale(1.02);
        }
        #close-portal{
            border-color: rgba(255,215,0,0.45);
            color: rgba(255,215,0,0.92);
            background: rgba(5,0,18,0.82);
            box-shadow: 0 0 40px rgba(255,215,0,0.10);
        }
        #close-portal:hover{
            background: rgba(255,215,0,0.95);
            color: #02000a;
            box-shadow: 0 0 80px rgba(255,215,0,0.35);
        }
</style>

<body>

    <div class="scanline"></div>

    <div id="nexus-canvas"></div>

    <div id="ui-container">
        <div class="header">
            <h1>GODNODE2</h1>
            <p style="font-size: 0.8rem; letter-spacing: 15px; opacity: 0.4; margin-top: 10px;">DIVINE PORTAL</p>
        </div>

        <div class="portals">
            <!-- Left: Architect (3D Pink Globe) -->
            <div class="portal-trigger" onclick="engagePortal('BookOfGray_RoyalEdition.html')">
                <div class="portal-label" style="color: #a855f7;">BOOK OF GRAY</div>
            </div>
            
            <!-- Right: Empire (3D Gold Crown) -->
            <div class="portal-trigger" onclick="engagePortal('GodNode2.html')">
                <div class="portal-label" style="color: #ffd700;">GODNODE2</div>
            </div>
        </div>

        <div style="text-align: center; color: rgba(255,255,255,0.15); font-size: 0.6rem; letter-spacing: 6px; margin-bottom: 30px;">
            SECURE LINK ESTABLISHED // SELECT MODULE
        </div>

    <div id="app-projection">
        <iframe id="app-frame" src=""></iframe>
        <button id="close-portal" onclick="disengagePortal()">RETURN TO PORTAL</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, starfield, crownGroup, globeGroup;
        let isWarping = false;
        let mouseX = 0, mouseY = 0;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050012, 0.001);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 65;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('nexus-canvas').appendChild(renderer.domElement);

            // --- STARS ---
            const starGeo = new THREE.BufferGeometry();
            const starCount = 12000;
            const posArray = new Float32Array(starCount * 3);
            for(let i=0; i<starCount*3; i++) {
                posArray[i] = (Math.random() - 0.5) * 1200;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const starMat = new THREE.PointsMaterial({ size: 0.65, color: 0xffffff, transparent: true, opacity: 0.65 });
            starfield = new THREE.Points(starGeo, starMat);
            scene.add(starfield);

            // --- THE 3D PINK GLOBE (ARCHITECT) ---
            globeGroup = new THREE.Group();
            
            // Solid Pink Sphere (The Base)
            const globeGeo = new THREE.SphereGeometry(10, 64, 64);
            const globeMat = new THREE.MeshPhongMaterial({ 
                color: 0x56c7ff, 
                emissive: 0xa855f7, 
                emissiveIntensity: 0.4,
                shininess: 30
            });
            const globeMesh = new THREE.Mesh(globeGeo, globeMat);
            globeGroup.add(globeMesh);

            // Neon Topographical Overlay (Continents Look)
            const topoGeo = new THREE.SphereGeometry(10.2, 32, 32);
            const topoMat = new THREE.MeshBasicMaterial({ 
                color: 0xa855f7, 
                wireframe: true, 
                transparent: true, 
                opacity: 0.4 
            });
            const topoMesh = new THREE.Mesh(topoGeo, topoMat);
            globeGroup.add(topoMesh);

            globeGroup.position.set(-38, 0, 0);
            scene.add(globeGroup);

            // --- THE 3D NEON CROWN (EMPIRE) ---
            crownGroup = new THREE.Group();
            const neonGoldMat = new THREE.MeshBasicMaterial({ 
                color: 0xffd700, 
                wireframe: true,
                transparent: true,
                opacity: 1.0 
            });

            const baseGeo = new THREE.TorusGeometry(10, 1.2, 16, 60);
            const base = new THREE.Mesh(baseGeo, neonGoldMat);
            base.rotation.x = Math.PI / 2;
            crownGroup.add(base);

            const spikeGeo = new THREE.ConeGeometry(3, 10, 4);
            const orbGeo = new THREE.SphereGeometry(1.2, 12, 12);
            const whiteMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

            for(let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const spike = new THREE.Mesh(spikeGeo, neonGoldMat);
                spike.position.x = Math.cos(angle) * 10;
                spike.position.z = Math.sin(angle) * 10;
                spike.position.y = 4;
                spike.lookAt(new THREE.Vector3(0, 15, 0));
                crownGroup.add(spike);

                const orb = new THREE.Mesh(orbGeo, whiteMat);
                orb.position.copy(spike.position);
                orb.position.y += 5;
                crownGroup.add(orb);
                
                const spikeLight = new THREE.PointLight(0xffd700, 2, 35);
                spikeLight.position.copy(orb.position);
                crownGroup.add(spikeLight);
            }

            const centerGeo = new THREE.OctahedronGeometry(4, 0);
            const centerMesh = new THREE.Mesh(centerGeo, new THREE.MeshBasicMaterial({ color: 0xffd700, wireframe: true }));
            centerMesh.position.y = 2;
            crownGroup.add(centerMesh);

            crownGroup.position.set(38, -4, 0);
            scene.add(crownGroup);

            // LIGHTS
            const l2 = new THREE.PointLight(0xffd700, 5, 200);
            l2.position.set(38, 10, 30);
            scene.add(l2);

            const l1 = new THREE.PointLight(0xa855f7, 5, 200);
            l1.position.set(-38, 10, 30);
            scene.add(l1);

            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            starfield.rotation.y += isWarping ? 0.18 : 0.0006;
            
            if(!isWarping) {
                // Crown Animation
                crownGroup.rotation.y += 0.012;
                crownGroup.position.y = -4 + Math.sin(time * 0.8) * 4;

                // Globe Animation
                globeGroup.rotation.y += 0.008;
                globeGroup.position.y = 0 + Math.sin(time) * 4;
                
                // Camera Move Parallax
                camera.position.x += (mouseX - camera.position.x) * 0.07;
                camera.position.y += (-mouseY - camera.position.y) * 0.07;
                camera.lookAt(scene.position);
            } else {
                camera.position.z -= 25;
                if(camera.position.z < -400) camera.position.z = 65; 
            }

            renderer.render(scene, camera);
        }

        function engagePortal(url) {
            isWarping = true;
            document.getElementById('nexus-canvas').style.filter = 'brightness(15) blur(60px)';
            
            setTimeout(() => {
                const projection = document.getElementById('app-projection');
                const frame = document.getElementById('app-frame');
                frame.src = url;
                projection.style.display = 'block';
                setTimeout(() => projection.classList.add('active'), 20);
            }, 500);
        }

        function disengagePortal() {
            const projection = document.getElementById('app-projection');
            projection.classList.remove('active');
            
            setTimeout(() => {
                projection.style.display = 'none';
                document.getElementById('app-frame').src = '';
                document.getElementById('nexus-canvas').style.filter = 'none';
                isWarping = false;
                camera.position.z = 65;
            }, 600);
        }

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) * 0.06;
            mouseY = (e.clientY - window.innerHeight / 2) * 0.06;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
<button id="pwa-install-btn" aria-label="Install GODNODE2 Portal" title="Install">INSTALL PORTAL</button>

<script>
(function(){
  // Service worker (static file)
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }

  // Install prompt
  let deferredPrompt = null;
  const btn = document.getElementById("pwa-install-btn");
  if (!btn) return;

  btn.style.display = "none";

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;
    btn.style.display = "block";
  });

  btn.addEventListener("click", async () => {
    if (!deferredPrompt) return;
    btn.style.display = "none";
    deferredPrompt.prompt();
    try { await deferredPrompt.userChoice; } catch(e) {}
    deferredPrompt = null;
  });

  window.addEventListener("appinstalled", () => {
    btn.style.display = "none";
    deferredPrompt = null;
  });
})();
</script>

  <script src="/skyehawk.js"></script>
</body>
