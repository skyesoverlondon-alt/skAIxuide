<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyeLeticX Animated Intro</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP for advanced animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #050505;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* 3D Perspective container */
        .perspective-container {
            perspective: 1200px;
            transform-style: preserve-3d;
        }

        /* Shine effect that sweeps across the logo */
        .shine-container {
            mask-image: url('https://cdn1.sharemyimage.com/2026/02/09/SkyeLeticX_Badge_transparent_2048_png8.png');
            mask-size: contain;
            mask-repeat: no-repeat;
            mask-position: center;
            -webkit-mask-image: url('https://cdn1.sharemyimage.com/2026/02/09/SkyeLeticX_Badge_transparent_2048_png8.png');
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-position: center;
        }

        .shine-element {
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.8) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg) translateX(-150%);
        }

        /* Subtle drop shadow for depth */
        .logo-shadow {
            filter: drop-shadow(0 20px 30px rgba(0, 162, 255, 0.4));
        }
    </style>
</head>
<body class="w-full h-screen text-white flex items-center justify-center relative">

    <!-- Background Particle Canvas -->
    <canvas id="particle-canvas" class="absolute inset-0 z-0 opacity-60"></canvas>

    <!-- Ambient Glow behind the logo -->
    <div id="ambient-glow" class="absolute w-[40vw] h-[40vw] max-w-[600px] max-h-[600px] bg-blue-600 rounded-full blur-[100px] opacity-0 z-0 mix-blend-screen pointer-events-none transition-transform"></div>

    <!-- Main Content Container -->
    <div class="perspective-container relative z-10 flex flex-col items-center justify-center w-full h-full">
        
        <!-- Logo Wrapper for 3D transforms -->
        <div id="logo-wrapper" class="relative w-64 md:w-96 lg:w-[450px] opacity-0 flex justify-center items-center logo-shadow">
            
            <!-- The Actual Image -->
            <img id="main-logo" src="https://cdn1.sharemyimage.com/2026/02/09/SkyeLeticX_Badge_transparent_2048_png8.png" alt="SkyeLeticX Badge" class="w-full h-auto relative z-10">
            
            <!-- Masked shine overlay that perfectly fits the logo shape -->
            <div class="shine-container absolute inset-0 z-20 pointer-events-none">
                <div id="shine" class="shine-element absolute top-0 -left-[50%] w-[200%] h-full"></div>
            </div>
            
        </div>

        <!-- Cinematic Subtitle Text -->
        <div id="intro-text" class="mt-12 text-center opacity-0 z-10">
            <h1 class="text-2xl md:text-4xl font-light tracking-[0.5em] uppercase text-transparent bg-clip-text bg-gradient-to-r from-gray-300 via-white to-gray-300">
                SkyeLeticX
            </h1>
            <p id="sub-text" class="mt-3 text-sm md:text-base tracking-[0.3em] text-blue-400 font-medium uppercase opacity-0">
                Performance Evolution
            </p>
        </div>
    </div>

    <!-- Replay Button (Appears after intro) -->
    <button id="replay-btn" class="absolute bottom-8 right-8 z-50 flex items-center gap-2 px-4 py-2 bg-white/10 hover:bg-white/20 border border-white/20 rounded-full backdrop-blur-md transition-all opacity-0 cursor-pointer pointer-events-none text-sm font-medium tracking-wide">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Replay Sequence
    </button>

    <script>
        // --- 1. Particle System Setup ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5 - 0.5; // Drift upwards slowly
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }
                if (this.x < 0 || this.x > canvas.width) {
                    this.speedX *= -1;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(150, 200, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 9000;
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }
        
        initParticles();
        animateParticles();

        // --- 2. GSAP Cinematic Intro Sequence ---
        let mainTimeline;
        let floatingAnimation;

        function playIntro() {
            // Kill active animations if replaying
            if (mainTimeline) mainTimeline.kill();
            if (floatingAnimation) floatingAnimation.kill();
            
            // Reset state
            gsap.set("#logo-wrapper", { opacity: 0, scale: 2.5, rotationX: 45, rotationY: -30, z: -500, filter: "blur(20px)" });
            gsap.set("#main-logo", { filter: "brightness(0)" });
            gsap.set("#ambient-glow", { opacity: 0, scale: 0.5 });
            gsap.set("#shine", { xPercent: 0 });
            gsap.set("#intro-text", { opacity: 0, y: 30 });
            gsap.set("#intro-text h1", { letterSpacing: "1em" });
            gsap.set("#sub-text", { opacity: 0, y: 10 });
            gsap.set("#replay-btn", { opacity: 0, pointerEvents: "none" });

            mainTimeline = gsap.timeline();

            // 1. Dramatic zoom in and unblur
            mainTimeline.to("#logo-wrapper", {
                duration: 2.5,
                scale: 1,
                opacity: 1,
                rotationX: 0,
                rotationY: 0,
                z: 0,
                filter: "blur(0px)",
                ease: "power3.out"
            }, 0.5);

            // 2. Logo fades from black to full color as it arrives
            mainTimeline.to("#main-logo", {
                duration: 2,
                filter: "brightness(1)",
                ease: "power2.inOut"
            }, 1.0);

            // 3. Ambient background glow ignites
            mainTimeline.to("#ambient-glow", {
                duration: 2,
                opacity: 0.4,
                scale: 1,
                ease: "power2.out"
            }, 1.5);

            // 4. Glass shine sweeps across the logo mask
            mainTimeline.to("#shine", {
                duration: 1.5,
                xPercent: 300,
                ease: "power1.inOut"
            }, 2.2);

            // 5. Text elements reveal with letter-spacing tracking
            mainTimeline.to("#intro-text", {
                duration: 1.5,
                opacity: 1,
                y: 0,
                ease: "power3.out"
            }, 2.8);

            mainTimeline.to("#intro-text h1", {
                duration: 2,
                letterSpacing: "0.5em",
                ease: "power3.out"
            }, 2.8);

            mainTimeline.to("#sub-text", {
                duration: 1,
                opacity: 1,
                y: 0,
                ease: "power2.out"
            }, 3.5);

            // 6. Show replay button and start continuous idle animation
            mainTimeline.to("#replay-btn", {
                duration: 0.5,
                opacity: 1,
                pointerEvents: "auto",
                onComplete: startIdleAnimation
            }, 4.5);
        }

        function startIdleAnimation() {
            // Continuous subtle floating effect
            floatingAnimation = gsap.to("#logo-wrapper", {
                y: "-=15",
                rotationY: "+=3",
                rotationX: "-=2",
                duration: 3,
                yoyo: true,
                repeat: -1,
                ease: "sine.inOut"
            });
            
            // Pulse the background glow slightly
            gsap.to("#ambient-glow", {
                opacity: 0.6,
                scale: 1.05,
                duration: 4,
                yoyo: true,
                repeat: -1,
                ease: "sine.inOut"
            });
        }

        // --- 3. Interactivity ---
        
        // Parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            
            gsap.to(".perspective-container", {
                rotationY: -xAxis,
                rotationX: yAxis,
                duration: 1,
                ease: "power1.out"
            });
            
            // Move glow opposite to mouse for depth
            gsap.to("#ambient-glow", {
                x: xAxis * 10,
                y: yAxis * 10,
                duration: 1,
                ease: "power1.out"
            });
        });

        // Setup Replay Button
        document.getElementById('replay-btn').addEventListener('click', playIntro);

        // Start sequence when page loads
        window.addEventListener('load', () => {
            // Small delay so the user registers the black screen before the burst
            setTimeout(playIntro, 300);
        });

    </script>
</body>
</html>
