[build]
  functions = "netlify/functions"
  publish = "."

[functions]
  node_bundler = "esbuild"

[dev]
  command = "npx serve . -l 5500 --no-clipboard"
  targetPort = 5500
  port = 8080
  autoLaunch = false

[[redirects]]
  from = "/api/*"
  to = "https://kaixugateway13.netlify.app/:splat"
  status = 200
  force = true